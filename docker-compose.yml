services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: zoomartists_postgres
    environment:
      POSTGRES_DB: zoomartists
      POSTGRES_USER: zoomartists
      POSTGRES_PASSWORD: zoomartists_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoomartists"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zoomartists_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
